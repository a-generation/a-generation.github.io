<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Notepad</title>
    <style>body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    background-color: #f0f0f0;
}

.menu {
    background: white;
    padding: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0);
    display: flex;
    justify-content: space-between;
}

button {
    padding: 10px;
    border: none;
    border-radius: 5px;
    background-color: #000;
    color: white;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background-color: #3B3B3B;
}

textarea {
    flex: 1;
    border: none;
    padding: 20px;
    box-sizing: border-box;
    font-size: 16px;
    resize: none;
    outline: none;
}
</style>
</head>
<body>
    <div class="menu">
        <input type="file" id="fileInput" accept=".txt" style="display:none;">
        <button onclick="document.getElementById('fileInput').click();">Open TXT File</button>
        <button onclick="downloadFile()">Download as TXT</button>
    </div>
    <textarea id="notepad" placeholder="Type your notes here..."></textarea>
    <script>// Function to download the text area content as a .txt file
function downloadFile() {
    const text = document.getElementById('notepad').value;
    const blob = new Blob([text], { type: 'text/plain' });
    const anchor = document.createElement('a');
    anchor.download = 'note.txt';
    anchor.href = window.URL.createObjectURL(blob);
    anchor.target = '_blank';
    anchor.style.display = 'none'; // Hide the element
    document.body.appendChild(anchor);
    anchor.click();
    document.body.removeChild(anchor);
}

// Function to open a .txt file and display its content in the text area
document.getElementById('fileInput').addEventListener('change', function(event) {
    const file = event.target.files[0];
    if (file && file.type === 'text/plain') {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('notepad').value = e.target.result;
        };
        reader.readAsText(file);
    } else {
        alert('Please select a valid .txt file.');
    }
});
</script>
</body>
</html>
