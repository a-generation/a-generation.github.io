            let mseContent = document.getElementById('txtContent').value.trim();
            let decryptedContent = decryptMSE(mseContent);
            document.getElementById('txtContent').value = decryptedContent;
        }

        // Function to encrypt content to MSE format

            let encryptedContent = encryptToMSE(plainContent);
            // Simulate saving, you can implement actual saving logic here
            alert("Encrypted MSE content:\n" + encryptedContent);
        }

        // Function to decrypt MSE content
        function decryptMSE(mseContent) {

            // For simplicity, assuming direct decryption for demonstration
            return mseContent; // Replace with actual decryption logic
        }

        // Function to encrypt content to MSE format
        function encryptToMSE(plainContent) {
            // Implement encryption logic based on your MSE encryption rules
