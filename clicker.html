<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji Clicker</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
  }
  .emoji {
    font-size: 3rem;
    cursor: pointer;
    transition: transform 0.2s ease-in-out;
  }
  .emoji:hover {
    transform: scale(1.2);
  }
  .reset-button {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 1rem;
    cursor: pointer;
    background-color: #ccc;
    border: none;
    border-radius: 5px;
  }
  .emoji-small {
    position: absolute;
    opacity: 0;
    animation: fly-up 1s ease-out;
  }
  @keyframes fly-up {
    0% {
      opacity: 1;
      transform: translateY(0);
    }
    100% {
      opacity: 0;
      transform: translateY(-100px);
    }
  }
</style>
</head>
<body>
  <h1>Emoji Clicker</h1>
  <div class="emoji-container">
    <div class="emoji" onclick="clickEmoji()">😊</div>
  </div>
  <button class="reset-button" onclick="resetCounter()">Reset</button>

  <script>
    let clickCount = 0;

    function clickEmoji() {
      clickCount++;
      document.getElementById('emoji-count').textContent = clickCount;

      // Create small emojis
      const emojiContainer = document.querySelector('.emoji-container');
      const emojiSmall = document.createElement('div');
      emojiSmall.textContent = '😊';
      emojiSmall.classList.add('emoji-small');
      emojiContainer.appendChild(emojiSmall);

      // Remove small emojis after animation
      setTimeout(() => {
        emojiContainer.removeChild(emojiSmall);
      }, 1000);
    }

    function resetCounter() {
      clickCount = 0;
      document.getElementById('emoji-count').textContent = clickCount;
    }
  </script>
</body>
</html>
