<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Clicker</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            overflow: hidden;
            touch-action: none; /* Отключение жестов */
            -webkit-user-select: none; /* Отключение выбора текста на iOS */
            -ms-user-select: none; /* Отключение выбора текста на Windows */
            user-select: none; /* Отключение выбора текста */
        }
        .game-container {
            text-align: center;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        .emoji {
            font-size: 150px;
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
        }
        .emoji:active {
            transform: scale(0.9);
        }
        .score {
            font-size: 48px;
            margin-top: 20px;
        }
        #resetButton {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            background-color: #ff5733; /* Новый цвет кнопки */
            color: white;
            cursor: pointer;
        }
        #resetButton:hover {
            background-color: #c70039;
        }
        .mini-emoji {
            position: absolute;
            font-size: 30px;
            opacity: 0;
            animation: fadeUp 2s forwards;
        }
        @keyframes fadeUp {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-200px);
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="emoji" id="emoji">😀</div>
        <div class="score" id="score">0</div>
        <button id="resetButton">Reset</button>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let score = 0;
            const emojiElement = document.getElementById('emoji');
            const scoreElement = document.getElementById('score');
            const resetButton = document.getElementById('resetButton');

            const emojis = ['😀', '😃', '😄', '😁', '😆', '😅', '😂', '🤣', '😊', '😇', '🙂', '🙃', '😉', '😌', '😍', '🥰', '😘', '😗', '😙', '😚'];

            emojiElement.addEventListener('click', () => {
                score++;
                scoreElement.textContent = score;
                emojiElement.textContent = emojis[score % emojis.length];

                // Создаем маленькие копии эмодзи
                for (let i = 0; i < 5; i++) {
                    createMiniEmoji(emojiElement.textContent);
                }
            });

            resetButton.addEventListener('click', () => {
                score = 0;
                scoreElement.textContent = score;
                emojiElement.textContent = emojis[0];
            });

            function createMiniEmoji(emoji) {
                const miniEmoji = document.createElement('div');
                miniEmoji.textContent = emoji;
                miniEmoji.classList.add('mini-emoji');
                document.body.appendChild(miniEmoji);

                // Позиционируем маленькие эмодзи вокруг большого эмодзи
                const rect = emojiElement.getBoundingClientRect();
                const x = rect.left + rect.width / 2 + (Math.random() - 0.5) * 100;
                const y = rect.top + rect.height / 2 + (Math.random() - 0.5) * 100;
                miniEmoji.style.left = `${x}px`;
                miniEmoji.style.top = `${y}px`;

                // Удаляем маленькие эмодзи после завершения анимации
                miniEmoji.addEventListener('animationend', () => {
                    miniEmoji.remove();
                });
            }
        });

        // Отключаем жесты браузера
        window.addEventListener('gesturestart', (e) => e.preventDefault());
        window.addEventListener('gesturechange', (e) => e.preventDefault());
        window.addEventListener('gestureend', (e) => e.preventDefault());
    </script>
</body>
</html>
