<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Community</title>
    <link rel="icon" href="favicon.png" type="image/x-icon">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .navbar {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        .navbar a {
            color: #fff;
            text-decoration: none;
            padding: 0 15px;
        }
        .container {
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }
        .news {
            margin-top: 20px;
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .news img {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }
        .news .meta {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .alert {
            border: 1px solid rgb(239, 68, 68);
            background-color: rgb(253, 236, 236);
            color: rgb(0, 0, 0);
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            font-size: 1em;
            line-height: 1.5em;
        }
        .button {
            background-color: #333;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #000;
        }
    </style>
</head>
<body>

<div class="navbar">
    <a href="#">Главная</a>
    <a href="#">Новости</a>
    <a href="#">О нас</a>
    <a href="#">Контакты</a>
</div>

<div class="container">
    <div id="news-container"></div>
</div>

<script>
    fetch('news.php')
        .then(response => response.json())
        .then(data => {
            const newsContainer = document.getElementById('news-container');
            data.forEach(newsItem => {
                const newsDiv = document.createElement('div');
                newsDiv.classList.add('news');
                newsDiv.innerHTML = `
                    <div class="meta">Дата: ${newsItem.date} | Автор: ${newsItem.author}</div>
                    <h2>${newsItem.title}</h2>
                    <img src="${newsItem.image}" alt="News Image">
                    <p>${newsItem.content}</p>
                `;
                newsContainer.appendChild(newsDiv);
            });
        })
        .catch(error => console.error('Error fetching news:', error));
</script>

</body>
</html>
